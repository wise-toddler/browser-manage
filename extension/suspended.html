<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a; color: #64748b; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
    }
    .favicon { width: 32px; height: 32px; margin-bottom: 16px; border-radius: 4px; }
    .title { font-size: 20px; color: #e2e8f0; margin-bottom: 12px; max-width: 80%; text-align: center; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .url { font-size: 14px; color: #60a5fa; max-width: 80%; text-align: center; word-break: break-all; opacity: 0.8; }
    .domain { font-size: 12px; color: #475569; margin-top: 8px; }
    .hint { font-size: 12px; margin-top: 32px; color: #334155; border: 1px solid #1e293b; padding: 8px 16px; border-radius: 6px; }
    body:hover .hint { color: #94a3b8; border-color: #334155; }
  </style>
</head>
<body>
  <img class="favicon" id="favicon" src="" onerror="this.style.display='none'">
  <div class="title" id="title">Suspended Tab</div>
  <div class="url" id="url"></div>
  <div class="domain" id="domain"></div>
  <div class="hint">Click anywhere to restore</div>
  <script>
    const hash = location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const title = params.get('ttl') || params.get('title') || 'Suspended Tab';
    const url = params.get('uri') || params.get('url') || '';
    document.getElementById('title').textContent = title;
    document.getElementById('url').textContent = url;
    document.title = title;
    try {
      const hostname = new URL(url).hostname;
      document.getElementById('domain').textContent = hostname;
      document.getElementById('favicon').src = `https://www.google.com/s2/favicons?sz=32&domain=${hostname}`;
    } catch {}
    document.body.addEventListener('click', () => {
      if (!url) return;
      chrome.runtime.sendMessage({ action: 'unsuspendCurrent', url: url });
    });
  </script>
</body>
</html>
