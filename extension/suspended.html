<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a; color: #64748b; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
    }
    .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .title { font-size: 16px; color: #94a3b8; margin-bottom: 8px; max-width: 80%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .url { font-size: 12px; max-width: 80%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hint { font-size: 11px; margin-top: 24px; opacity: 0.4; }
    body:hover .hint { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="icon">||</div>
  <div class="title" id="title">Suspended Tab</div>
  <div class="url" id="url"></div>
  <div class="hint">Click anywhere to restore</div>
  <script>
    const hash = location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const title = params.get('ttl') || params.get('title') || 'Suspended Tab';
    const url = params.get('uri') || params.get('url') || '';
    document.getElementById('title').textContent = title;
    document.getElementById('url').textContent = url;
    document.title = title;
    // Restore on click
    document.body.addEventListener('click', () => {
      if (url) location.href = url;
    });
  </script>
</body>
</html>
